[project]
name = "liz-shared"
version = "0.1.0"
description = "Shared schemas and enums for Liz platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["liz_shared*"]
