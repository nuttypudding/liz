name: Deploy to QA (Spark)

on:
  push:
    branches: [qa]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build QA
        run: npm run build:qa --workspace=apps/web

      - name: Restart QA service
        run: sudo systemctl restart liz-qa
